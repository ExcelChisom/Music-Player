<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Modern Music Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons (optional but convenient) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="player-container">
        <!-- Left: Cover Art & Info -->
        <div class="player-main">
            <div class="cover">
                <img src="https://via.placeholder.com/300/1e1e2f/ffffff?text=Album+Cover" alt="Album Cover" id="cover-img">
            </div>
            <div class="song-info">
                <h2 id="song-title">Song Title</h2>
                <p id="song-artist">Artist Name</p>
            </div>
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" value="0" step="0.1" min="0" max="100">
                <span id="duration">0:00</span>
            </div>
            <div class="controls">
                <button id="prev"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause"><i class="fas fa-play"></i></button>
                <button id="next"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
            </div>
            <div class="autoplay-container">
                <label for="autoplay">Autoplay</label>
                <input type="checkbox" id="autoplay">
            </div>
        </div>

        <!-- Right: Playlist -->
        <div class="playlist">
            <h3>Playlist</h3>
            <ul id="playlist-list">
                <!-- Dynamically populated by JavaScript -->
            </ul>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
